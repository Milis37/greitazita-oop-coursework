<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreitaZita AI - Grožio Salono Finansai</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: auto; }
        input, select, button { padding: 10px; margin: 5px; font-size: 16px; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        .summary { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💅 GreitaZita – AI Finansų Valdymas (Vilnius Tech OOP Kursinis)</h1>
        <p>Vartotojas: Administratorius | Salono ID: 1</p>

        <h2>➕ Pridėti pajamas</h2>
        <input type="number" id="earningAmount" placeholder="Suma (€)" step="0.01">
        <input type="text" id="earningCategory" placeholder="Paslauga (pvz. Kirpimas)" value="Kirpimas">
        <input type="text" id="earningDesc" placeholder="Aprašymas (nebūtina)">
        <button onclick="addFinance('earning')">Pridėti pajamas</button>

        <h2>➖ Pridėti išlaidas</h2>
        <input type="number" id="expenseAmount" placeholder="Suma (€)" step="0.01">
        <select id="expenseCategory">
            <option value="Rent">Nuoma (Fixed)</option>
            <option value="Supplies">Prekės</option>
            <option value="Other">Kita</option>
        </select>
        <input type="text" id="expenseDesc" placeholder="Aprašymas (nebūtina)">
        <button onclick="addFinance('expense')">Pridėti išlaidas</button>

        <div class="summary" id="summary">
            <h3>📊 Real-time santrauka</h3>
            <p id="status">Laukiama duomenų...</p>
        </div>
    </div>

    <script>
        async function addFinance(type) {
            let amount, category, description;

            if (type === 'earning') {
                amount = parseFloat(document.getElementById('earningAmount').value);
                category = document.getElementById('earningCategory').value;
                description = document.getElementById('earningDesc').value || '';
            } else {
                amount = parseFloat(document.getElementById('expenseAmount').value);
                category = document.getElementById('expenseCategory').value;
                description = document.getElementById('expenseDesc').value || '';
            }

            if (!amount || isNaN(amount) || amount <= 0) {
                alert("Klaida: įveskite teisingą teigiamą sumą!");
                return;
            }

            const data = {
                salon_id: 1,
                type: type,
                amount: amount,
                category: category,
                description: description
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/add_finance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                document.getElementById('status').innerHTML = 
                    `<strong>${result.message}</strong><br>Failas: ${result.saved_file}`;
                
                alert(result.message);
                
                // Išvalome laukus
                if (type === 'earning') {
                    document.getElementById('earningAmount').value = '';
                } else {
                    document.getElementById('expenseAmount').value = '';
                }
            } catch (error) {
                console.error(error);
                alert("Klaida: negalima prisijungti prie serverio. Paleiskite run_api.py!");
            }
        }
    </script>
</body>
</html>
