<!DOCTYPE html>
<html>
<head>
    <title>GreitaZita AI Finance Tracker</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .chat-box {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            margin: 20px 0;
            background: #f9f9f9;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
        }
        .user {
            background: #667eea;
            color: white;
            text-align: right;
        }
        .ai {
            background: #e0e0e0;
            color: black;
            text-align: left;
        }
        input {
            width: 80%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 18%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #764ba2;
        }
        .salon-select {
            margin: 20px 0;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💅 GreitaZita AI Finance Tracker</h1>
        <p>For Beauty Salons - Chat with AI about your expenses & earnings</p>
        
        <select id="salonId" class="salon-select">
            <option value="1">💇 Salon市中心</option>
            <option value="2">💅 Salon北区</option>
            <option value="3">✂️ Salon南区</option>
        </select>
        
        <div id="chatBox" class="chat-box">
            <div class="message ai">🤖 Hi! Send me your 3-month expenses & earnings.<br>Example: "Rent 1200€, Haircut services 5000€, Supplies 300€"</div>
        </div>
        
        <input type="text" id="messageInput" placeholder="Type your message here..." 
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send 💬</button>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            const salonId = document.getElementById('salonId').value;
            
            // Display user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            addMessage("🤔 AI is thinking...", 'ai-typing');
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        salon_id: parseInt(salonId),
                        message: message
                    })
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                const typingMsg = document.querySelector('.ai-typing');
                if (typingMsg) typingMsg.remove();
                
                // Display AI response
                addMessage(data.response, 'ai');
                
            } catch (error) {
                const typingMsg = document.querySelector('.ai-typing');
                if (typingMsg) typingMsg.remove();
                addMessage("❌ Error: Can't connect to backend. Is run_api.py running?", 'ai');
            }
        }
        
        function addMessage(text, type) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = type === 'user' ? `👤 ${text}` : `🤖 ${text}`;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
