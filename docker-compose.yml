version: '3.9'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: greitazita
      MYSQL_USER: greitauser
      MYSQL_PASSWORD: greita123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    depends_on:
      - mysql
    environment:
      - DATABASE_URL=mysql+pymysql://greitauser:greita123@mysql:3306/greitazita
    ports:
      - "8000:8000"

volumes:
  mysql_data: